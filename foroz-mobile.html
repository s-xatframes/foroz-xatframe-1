<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>foroz - mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chokokutai&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 1080px;
            height: 2000px;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1a38 0%, #0f2550 35%, #163566 65%, #1b3f75 100%);
        }

        .scene {
            position: relative;
            width: 1080px;
            height: 2000px;
            overflow: hidden;
        }

        /* ── Sun rays ────────────────────────────── */
        .rays {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .rays::before {
            content: "";
            position: absolute;
            top: 8%;
            left: 45%;
            width: 4000px;
            height: 4000px;
            transform: translate(-50%, -50%) rotate(15deg);
            background: repeating-conic-gradient(
                rgba(120, 190, 255, 0.06) 0deg 4deg,
                transparent 4deg 20deg
            );
        }

        .rays::after {
            content: "";
            position: absolute;
            top: 8%;
            left: 45%;
            width: 4000px;
            height: 4000px;
            transform: translate(-50%, -50%) rotate(-10deg);
            background: repeating-conic-gradient(
                rgba(180, 220, 255, 0.04) 0deg 3deg,
                transparent 3deg 15deg
            );
        }

        /* ── Sun ────────────────────────────────── */
        .sun {
            position: absolute;
            top: 6%;
            left: 45%;
            transform: translateX(-50%);
            width: 140px;
            height: 140px;
            z-index: 2;
            filter: drop-shadow(0 0 40px rgba(140, 200, 255, 0.4))
                    drop-shadow(0 0 80px rgba(100, 180, 255, 0.2));
        }

        .sun svg {
            width: 100%;
            height: 100%;
        }

        /* ── Ambient glow spots ─────────────────── */
        .glow-spot {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
        }

        /* ── Clouds ─────────────────────────────── */
        .cloud {
            position: absolute;
        }

        .cloud-body {
            position: relative;
            display: inline-block;
        }

        .cloud-body svg {
            display: block;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 3px 0 rgba(80, 140, 220, 0.5))
                    drop-shadow(0 6px 16px rgba(0, 30, 100, 0.25));
        }

        .cloud-base { fill: #fff; }
        .cloud-shade { fill: #d0e4ff; }
        .cloud-highlight { fill: #f0f8ff; }
        .cloud-outline {
            fill: none;
            stroke: rgba(80, 130, 200, 0.6);
            stroke-width: 2.5;
            stroke-linejoin: round;
        }
        .cloud-eye { fill: #1a3a6a; }
        .cloud-eye-shine { fill: #fff; }

        /* ── Hills ──────────────────────────────── */
        .hills {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .hill-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .hill-layer svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .hill-back  { height: 600px; z-index: 4; }
        .hill-mid   { height: 480px; z-index: 6; }
        .hill-front { height: 350px; z-index: 8; }

        /* ── Logo ───────────────────────────────── */
        .logo-area {
            position: absolute;
            left: 45%;
            top: 16%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        .logo-text {
            font-family: 'Chokokutai', cursive;
            font-size: 4.5rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 5px;
            line-height: 1;
            text-shadow:
                0  1px 0 #e4edff,
                0  2px 0 #dce8ff,
                0  3px 0 #d0e0ff,
                0  4px 0 #c4d8ff,
                0  5px 0 #b8d0fa,
                0  6px 0 #a8c4f5,
                0  7px 0 #98b8f0,
                0  8px 0 #88abeb,
                0  9px 0 #78a0e6,
                0 10px 0 #6894e0,
                0 11px 0 #5888da,
                0 12px 0 #487cd4,
                0 13px 0 #3870ce,
                0 14px 0 #2864c8,
                0 15px 0 #1a58c2,
                0 16px 0 #104cbc,
                0 18px 18px rgba(8, 40, 130, 0.55),
                0 24px 40px rgba(10, 50, 160, 0.35),
                0 30px 60px rgba(10, 40, 140, 0.2),
                0  0  80px rgba(90, 165, 255, 0.2);
        }

        .logo-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(170, 210, 255, 0.45);
            letter-spacing: 4px;
            margin-top: 10px;
        }
    </style>
</head>
